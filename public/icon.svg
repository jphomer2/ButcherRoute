<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="100%" stop-color="#134E4A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Cargo box -->
  <rect x="64" y="130" width="238" height="190" rx="12" fill="white"/>

  <!-- Cab body -->
  <path d="M302,172 L364,130 L448,130 L448,320 L302,320 Z" fill="white"/>

  <!-- Windshield (dark tinted) -->
  <path d="M315,174 L366,142 L436,142 L436,234 L315,234 Z" fill="#0A3D3A"/>

  <!-- Cab door detail -->
  <line x1="348" y1="248" x2="348" y2="310" stroke="rgba(10,61,58,0.35)" stroke-width="5" stroke-linecap="round"/>

  <!-- Cargo door handle -->
  <rect x="172" y="214" width="6" height="36" rx="3" fill="rgba(15,118,110,0.45)"/>

  <!-- Chassis bar -->
  <rect x="54" y="310" width="402" height="24" rx="10" fill="white"/>

  <!-- Rear wheel -->
  <circle cx="154" cy="368" r="52" fill="white"/>
  <circle cx="154" cy="368" r="30" fill="#0B4845"/>
  <circle cx="154" cy="368" r="13" fill="rgba(255,255,255,0.4)"/>

  <!-- Front wheel -->
  <circle cx="394" cy="368" r="52" fill="white"/>
  <circle cx="394" cy="368" r="30" fill="#0B4845"/>
  <circle cx="394" cy="368" r="13" fill="rgba(255,255,255,0.4)"/>

  <!-- Route dots (subtle, above truck) -->
  <circle cx="138" cy="100" r="7" fill="rgba(255,255,255,0.25)"/>
  <circle cx="200" cy="88" r="5" fill="rgba(255,255,255,0.18)"/>
  <circle cx="262" cy="96" r="6" fill="rgba(255,255,255,0.22)"/>
  <circle cx="320" cy="84" r="5" fill="rgba(255,255,255,0.18)"/>
  <circle cx="378" cy="92" r="7" fill="rgba(255,255,255,0.25)"/>
</svg>
